name: Serenity 股票推文监控

# 免费档接口额度有限（常见 100~500 次/月），所以只在美股活跃时段查，避免超额。
# 下面是 UTC 时间 13:00–22:59 每 30 分钟一次 ≈ 20 次/天 ≈ 600 次/月。
#   - 若你的免费额度 ≤500/月：把 */30 改成 0（即每小时一次，约 300/月）。
#   - 若你付费额度充足：可改成 "*/15 * * * *" 全天每 15 分钟。
# 也可以随时在 Actions 页面手动触发（workflow_dispatch）。
on:
  schedule:
    - cron: "*/30 13-22 * * *"
  workflow_dispatch:
    inputs:
      send_test:
        description: "发一条测试推送到 Telegram（验证通道）"
        type: boolean
        default: false

# 允许工作流把去重状态文件 commit 回仓库
permissions:
  contents: write

# 避免多次运行同时写状态文件
concurrency:
  group: serenity-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r serenity-monitor/requirements.txt

      - name: Run monitor
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_USERNAME: aleabitoreddit
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEND_TEST: ${{ inputs.send_test }}
        run: python serenity-monitor/monitor.py

      - name: Persist state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- serenity-monitor/state/last_seen.json; then
            git add serenity-monitor/state/last_seen.json
            git commit -m "chore: update serenity monitor state [skip ci]"
            git push
          else
            echo "状态无变化，无需提交。"
          fi
