<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a1a">
<title>跃动小子</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
html,body { width:100%; height:100%; overflow:hidden; overscroll-behavior:none; }
body {
  background:radial-gradient(ellipse at 50% 0%, #1b2a5e 0%, #0d1233 50%, #06060f 100%);
  font-family:'Microsoft YaHei','PingFang SC',sans-serif; color:#eaf0ff;
  display:flex; align-items:center; justify-content:center;
  touch-action:none;
}
#wrap { position:relative; width:100vw; height:100dvh; max-width:560px; margin:0 auto; }
canvas { display:block; width:100%; height:100%; image-rendering:auto; }

/* ── HUD ── */
#hud {
  position:absolute; top:env(safe-area-inset-top,10px); left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 16px; font-weight:700; font-size:15px; pointer-events:none; z-index:5;
  text-shadow:0 2px 6px #000a;
}
#hud .pill { background:#0008; border:1px solid #ffffff22; border-radius:20px; padding:5px 12px; backdrop-filter:blur(4px); }
#hud .deaths { color:#ff8aa0; }
#hud .level { color:#8ee7ff; }
#hud .timer { color:#ffe08a; }

/* ── touch controls ── */
#touch { position:absolute; inset:0; z-index:6; display:none; }
.btn {
  position:absolute; bottom:calc(env(safe-area-inset-bottom,18px) + 18px);
  width:74px; height:74px; border-radius:50%;
  background:#ffffff14; border:2px solid #ffffff33; backdrop-filter:blur(3px);
  display:flex; align-items:center; justify-content:center;
  font-size:30px; color:#fff; pointer-events:auto;
  transition:transform .05s, background .1s;
}
.btn:active, .btn.held { background:#ffffff33; transform:scale(.92); }
#bLeft  { left:18px; }
#bRight { left:104px; }
#bJump  { right:18px; width:92px; height:92px; bottom:calc(env(safe-area-inset-bottom,18px) + 12px);
          background:linear-gradient(145deg,#ff7eb6,#9d6bff); border-color:#ffffff55; font-size:26px; font-weight:800; }

/* ── overlay screens ── */
#overlay {
  position:absolute; inset:0; z-index:10; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center; padding:24px;
  background:radial-gradient(ellipse at 50% 35%, #1b2a5ecc 0%, #06060fee 70%);
  backdrop-filter:blur(2px);
}
#overlay.hidden { display:none; }
#overlay h1 {
  font-size:clamp(2rem,11vw,3.4rem); font-weight:900; letter-spacing:3px; line-height:1.05;
  background:linear-gradient(135deg,#ff9de2,#c084fc,#67e8f9);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 18px #c084fc66); margin-bottom:6px;
}
#overlay .tag { font-size:clamp(.8rem,3.6vw,1rem); color:#a9b6e8; margin-bottom:26px; letter-spacing:1px; }
#overlay .taunt { font-size:clamp(1rem,4.6vw,1.35rem); color:#ffd27a; font-weight:700; margin-bottom:8px; }
#overlay .sub { font-size:clamp(.85rem,3.6vw,1rem); color:#cdd6f5; margin-bottom:24px; max-width:340px; line-height:1.6; }
#overlay button {
  font-family:inherit; font-weight:800; font-size:1.1rem; letter-spacing:2px;
  color:#1a0b2e; padding:15px 44px; border:none; border-radius:40px; cursor:pointer;
  background:linear-gradient(145deg,#ffd27a,#ff8aa0); box-shadow:0 8px 24px #ff8aa055;
  transition:transform .08s;
}
#overlay button:active { transform:scale(.95); }
#overlay .hint { margin-top:22px; font-size:.78rem; color:#7c87b8; line-height:1.7; }
.kbd { display:inline-block; background:#ffffff18; border:1px solid #ffffff33; border-radius:6px; padding:1px 8px; margin:0 2px; font-size:.78rem; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <span class="pill level">第 <b id="lvlNum">1</b> 关</span>
    <span class="pill timer" id="timer">0.0s</span>
    <span class="pill deaths">💀 <b id="deathNum">0</b></span>
  </div>

  <div id="touch">
    <div class="btn" id="bLeft">◀</div>
    <div class="btn" id="bRight">▶</div>
    <div class="btn" id="bJump">跳</div>
  </div>

  <div id="overlay">
    <h1>跃动小子</h1>
    <div class="tag">JUMPING&nbsp;KID&nbsp;·&nbsp;精准跳跃挑战</div>
    <div class="taunt" id="ovTaunt">你厉害你来把第二关过了！！！</div>
    <div class="sub" id="ovSub">第一关是热身。真正的考验在第二关——<br>每一跳都要刚刚好。</div>
    <button id="startBtn">开 始 挑 战</button>
    <div class="hint">
      手机：左下方向键 + 右下「跳」（可二段跳）<br>
      电脑：<span class="kbd">←</span><span class="kbd">→</span> 移动　<span class="kbd">空格</span>/<span class="kbd">↑</span> 跳　<span class="kbd">R</span> 重来
    </div>
  </div>
</div>

<script>
(() => {
'use strict';

// ───────────────────────── setup ─────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const r = canvas.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

// ───────────────────────── world ─────────────────────────
// Logical play field. We render into it then scale to canvas.
const VW = 800, VH = 450;     // virtual design resolution (16:9)
const GRAV = 0.78;
const MOVE = 0.95, FRICTION = 0.80, MAXVX = 5.8;
const JUMP = -13.2, JUMP2 = -11.4;   // first / double jump
const COYOTE = 6, JUMP_BUF = 7;

// Camera maps virtual world coords -> screen. We letterbox the VW×VH field.
let scale = 1, offX = 0, offY = 0;
function computeView() {
  scale = Math.min(W / VW, H / VH);
  offX = (W - VW * scale) / 2;
  offY = (H - VH * scale) / 2;
}

// ───────────────────────── levels ─────────────────────────
// Each level: spawn, goal, platforms[], spikes[], movers[], saws[], fallers[]
// Coords in virtual space. y grows downward.
const FLOOR_Y = 410;

const LEVELS = [
  { // L1 — gentle warm-up
    name: '热身',
    spawn: {x: 60, y: 360},
    goal:  {x: 720, y: 360, w: 44, h: 50},
    platforms: [
      {x: 0,   y: FLOOR_Y, w: 230, h: 40},
      {x: 300, y: 360,     w: 110, h: 20},
      {x: 470, y: 300,     w: 110, h: 20},
      {x: 640, y: FLOOR_Y, w: 160, h: 40},
    ],
    spikes: [ {x: 230, y: FLOOR_Y-2, w: 70} ],
    movers: [], saws: [], fallers: [],
  },
  { // L2 — THE CHALLENGE. Brutal precision. Moving platforms, saws, spikes, falling blocks.
    name: '魔鬼第二关',
    spawn: {x: 40, y: 360},
    goal:  {x: 748, y: 70, w: 40, h: 48},
    platforms: [
      {x: 0,   y: FLOOR_Y, w: 120, h: 40},
      {x: 250, y: 372,     w: 46,  h: 16},   // tiny step
      {x: 360, y: 318,     w: 40,  h: 14},   // tinier
      {x: 700, y: 360,     w: 100, h: 50},   // landing before climb
      {x: 470, y: 250,     w: 38,  h: 14},
      {x: 360, y: 178,     w: 40,  h: 14},
      {x: 250, y: 120,     w: 46,  h: 14},
      {x: 700, y: 130,     w: 100, h: 16},   // final ledge under goal
    ],
    spikes: [
      {x: 120, y: FLOOR_Y-2, w: 130},        // pit of spikes
      {x: 600, y: FLOOR_Y-2, w: 100},
    ],
    // moving platforms: bounce between a..b on given axis
    movers: [
      {x: 150, y: 300, w: 60, h: 14, axis:'x', a:140, b:340, spd:1.9, t:0},
      {x: 560, y: 360, w: 56, h: 14, axis:'x', a:520, b:660, spd:2.3, t:40},
      {x: 560, y: 200, w: 54, h: 14, axis:'y', a:150, b:300, spd:1.7, t:20},
    ],
    saws: [
      {x: 320, y: 372, r:22, axis:'x', a:300, b:430, spd:2.6, t:0},
      {x: 470, y: 250, r:18, axis:'y', a:140, b:300, spd:2.2, t:30},
    ],
    fallers: [  // blocks that drop when you pass under, then reset
      {x: 405, y: 130, w: 26, h: 26, trigX: 360, trigW: 90},
    ],
  },
  { // L3 — victory lap
    name: '凯旋',
    spawn: {x: 40, y: 360},
    goal:  {x: 720, y: 300, w: 44, h: 50},
    platforms: [
      {x: 0,   y: FLOOR_Y, w: 200, h: 40},
      {x: 280, y: 360,     w: 90,  h: 18},
      {x: 430, y: 320,     w: 90,  h: 18},
      {x: 600, y: 350,     w: 200, h: 60},
    ],
    spikes: [ {x: 200, y: FLOOR_Y-2, w: 80} ],
    movers: [ {x: 360, y: 300, w: 60, h: 14, axis:'x', a:360, b:430, spd:1.4, t:0} ],
    saws: [], fallers: [],
  },
];

// ───────────────────────── state ─────────────────────────
const player = {x:0, y:0, vx:0, vy:0, w:24, h:30, onGround:false, coyote:0, jumpBuf:0, jumps:0, facing:1, squash:1, alive:true};
let level = 0;
let deaths = 0;
let running = false;
let levelTime = 0;     // ms
let totalTime = 0;
let frame = 0;
let particles = [];
let screenShake = 0;
let respawnFlash = 0;
let goalAnim = 0;
let transitioning = false;
let bgStars = [];

function initStars(){
  bgStars = [];
  for(let i=0;i<60;i++) bgStars.push({x:Math.random()*VW, y:Math.random()*VH, r:Math.random()*1.6+0.3, tw:Math.random()*Math.PI*2});
}
initStars();

// keep a working copy of level dynamic objects so we can reset them
let movers=[], saws=[], fallers=[];
function loadLevel(i){
  level = i;
  const L = LEVELS[i];
  player.x = L.spawn.x; player.y = L.spawn.y;
  player.vx = 0; player.vy = 0; player.onGround=false; player.jumps=0; player.alive=true;
  player.coyote=0; player.jumpBuf=0; player.squash=1;
  levelTime = 0; goalAnim = 0;
  // deep-ish copy dynamic objects
  movers  = (L.movers ||[]).map(m=>({...m, t:m.t||0}));
  saws    = (L.saws   ||[]).map(s=>({...s, t:s.t||0}));
  fallers = (L.fallers||[]).map(f=>({...f, fy:f.y, falling:false, vy:0, dead:false, cd:0}));
  document.getElementById('lvlNum').textContent = i+1;
}

// ───────────────────────── input ─────────────────────────
const keys = {left:false, right:false, jump:false};
function pressJump(){ player.jumpBuf = JUMP_BUF; keys.jump = true; }
function releaseJump(){ keys.jump = false; }

window.addEventListener('keydown', e=>{
  if(e.repeat) return;
  switch(e.code){
    case 'ArrowLeft': case 'KeyA': keys.left=true; break;
    case 'ArrowRight': case 'KeyD': keys.right=true; break;
    case 'ArrowUp': case 'Space': case 'KeyW': pressJump(); e.preventDefault(); break;
    case 'KeyR': if(running) killPlayer(true); break;
  }
});
window.addEventListener('keyup', e=>{
  switch(e.code){
    case 'ArrowLeft': case 'KeyA': keys.left=false; break;
    case 'ArrowRight': case 'KeyD': keys.right=false; break;
    case 'ArrowUp': case 'Space': case 'KeyW': releaseJump(); break;
  }
});

// touch
const touchUI = document.getElementById('touch');
function bindHold(id, on, off){
  const el = document.getElementById(id);
  const start=e=>{e.preventDefault(); el.classList.add('held'); on();};
  const end=e=>{e.preventDefault(); el.classList.remove('held'); off();};
  el.addEventListener('touchstart', start, {passive:false});
  el.addEventListener('touchend', end, {passive:false});
  el.addEventListener('touchcancel', end, {passive:false});
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', end);
  el.addEventListener('mouseleave', e=>{ if(el.classList.contains('held')) end(e); });
}
bindHold('bLeft',  ()=>keys.left=true,  ()=>keys.left=false);
bindHold('bRight', ()=>keys.right=true, ()=>keys.right=false);
bindHold('bJump',  ()=>pressJump(),     ()=>releaseJump());

const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;

// ───────────────────────── physics helpers ─────────────────────────
function aabb(ax,ay,aw,ah, bx,by,bw,bh){
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function solidRects(){
  // floor + static platforms + current mover positions
  const L = LEVELS[level];
  const rects = L.platforms.map(p=>({x:p.x,y:p.y,w:p.w,h:p.h, mover:null}));
  for(const m of movers) rects.push({x:m.x, y:m.y, w:m.w, h:m.h, mover:m});
  for(const f of fallers) if(!f.dead) rects.push({x:f.x, y:f.fy, w:f.w, h:f.h, mover:null});
  return rects;
}

function updateMovers(){
  for(const m of movers){
    m.t += m.spd;
    // ping-pong between a..b via cosine easing
    const v = m.a + (m.b-m.a) * (0.5 - 0.5*Math.cos(m.t*0.018));
    if(m.axis==='x'){ m.px=m.x; m.x = v; m.dx = m.x-m.px; m.dy=0; }
    else            { m.py=m.y; m.y = v; m.dy = m.y-(m.py); m.dx=0; }
  }
  for(const s of saws){
    s.t += s.spd;
    const v = s.a + (s.b-s.a) * (0.5 - 0.5*Math.cos(s.t*0.02));
    if(s.axis==='x') s.x=v; else s.y=v;
    s.spin = (s.spin||0) + 0.3;
  }
  // fallers
  const L = LEVELS[level];
  for(const f of fallers){
    if(f.dead){ f.cd--; if(f.cd<=0){ f.dead=false; f.falling=false; f.fy=f.y; f.vy=0; } continue; }
    if(!f.falling){
      if(player.x+player.w > f.trigX && player.x < f.trigX+f.trigW && player.y > f.fy){
        f.falling=true;
      }
    } else {
      f.vy += GRAV*0.9; f.fy += f.vy;
      if(f.fy > VH+40){ f.dead=true; f.cd=70; }
    }
  }
}

function jumpNow(){
  if(player.jumps===0 && (player.onGround || player.coyote>0)){
    player.vy = JUMP; player.jumps=1; player.onGround=false; player.coyote=0; player.jumpBuf=0;
    player.squash = 0.6; spawnDust(player.x+player.w/2, player.y+player.h, 6);
  } else if(player.jumps===1){
    player.vy = JUMP2; player.jumps=2; player.jumpBuf=0;
    player.squash = 0.65; spawnDust(player.x+player.w/2, player.y+player.h/2, 8, '#9d6bff');
  }
}

function physics(){
  const L = LEVELS[level];
  // horizontal
  if(keys.left){ player.vx -= MOVE; player.facing=-1; }
  if(keys.right){ player.vx += MOVE; player.facing=1; }
  if(!keys.left && !keys.right) player.vx *= FRICTION;
  player.vx = Math.max(-MAXVX, Math.min(MAXVX, player.vx));

  // jump buffer / coyote handling
  if(player.jumpBuf>0) player.jumpBuf--;
  if(player.coyote>0) player.coyote--;
  if(player.jumpBuf>0 && (player.onGround || player.coyote>0 || player.jumps<2)){
    // only fire if a fresh press is buffered and we can act
    if(player.onGround || player.coyote>0 || player.jumps<2){
      jumpNow();
    }
  }
  // variable jump height: cut upward velocity on release
  if(!keys.jump && player.vy < -4) player.vy *= 0.86;

  player.vy += GRAV;
  if(player.vy > 18) player.vy = 18;

  const rects = solidRects();
  player.onGround = false;

  // move X then resolve
  player.x += player.vx;
  for(const r of rects){
    if(aabb(player.x,player.y,player.w,player.h, r.x,r.y,r.w,r.h)){
      if(player.vx>0) player.x = r.x - player.w;
      else if(player.vx<0) player.x = r.x + r.w;
      player.vx = 0;
    }
  }
  // move Y then resolve
  player.y += player.vy;
  for(const r of rects){
    if(aabb(player.x,player.y,player.w,player.h, r.x,r.y,r.w,r.h)){
      if(player.vy>0){
        player.y = r.y - player.h;
        if(!player.onGround && player.vy>6){ player.squash=1.35; spawnDust(player.x+player.w/2, player.y+player.h, 4); }
        player.onGround=true; player.vy=0; player.jumps=0; player.coyote=COYOTE;
        // ride moving platforms
        if(r.mover){ player.x += r.mover.dx||0; }
      } else if(player.vy<0){
        player.y = r.y + r.h; player.vy = 0;
      }
    }
  }

  // squash recovery
  player.squash += (1 - player.squash)*0.2;

  // bounds: fell off / hit spikes / saws
  if(player.y > VH + 30){ killPlayer(); return; }
  if(player.x < -40 || player.x > VW+40){ player.x = Math.max(-40, Math.min(VW+40, player.x)); player.vx=0; }

  // spikes
  for(const s of L.spikes){
    // spike strip top at s.y, height ~14, triangles
    if(aabb(player.x, player.y, player.w, player.h, s.x, s.y-12, s.w, 14)){ killPlayer(); return; }
  }
  // saws
  for(const s of saws){
    const cx = player.x+player.w/2, cy=player.y+player.h/2;
    const dx = cx - s.x, dy = cy - s.y;
    if(dx*dx+dy*dy < (s.r+10)*(s.r+10)){ killPlayer(); return; }
  }

  // goal
  if(aabb(player.x,player.y,player.w,player.h, L.goal.x, L.goal.y-L.goal.h+4, L.goal.w, L.goal.h)){
    reachGoal();
  }
}

function spawnDust(x,y,n,color){
  for(let i=0;i<n;i++){
    particles.push({x,y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.7)*3, life:18+Math.random()*12, max:30, color:color||'#cdd6f5', r:Math.random()*2.4+1});
  }
}
function spawnBurst(x,y,color){
  for(let i=0;i<26;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*5+1;
    particles.push({x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1, life:24+Math.random()*16, max:40, color, r:Math.random()*3+1.5});
  }
}

function killPlayer(silent){
  if(!player.alive) return;
  player.alive=false;
  deaths++;
  document.getElementById('deathNum').textContent = deaths;
  if(!silent){ spawnBurst(player.x+player.w/2, player.y+player.h/2, '#ff7e8a'); screenShake=10; }
  respawnFlash = 12;
  setTimeout(()=>{ if(running) loadLevel(level); }, 280);
}

function reachGoal(){
  if(transitioning) return;
  transitioning = true;
  spawnBurst(LEVELS[level].goal.x+20, LEVELS[level].goal.y-10, '#67e8f9');
  spawnBurst(LEVELS[level].goal.x+20, LEVELS[level].goal.y-10, '#ffd27a');
  screenShake = 6;
  const wasLevel = level;
  setTimeout(()=>{
    transitioning = false;
    if(wasLevel+1 < LEVELS.length){
      loadLevel(wasLevel+1);
      flashBanner('第 '+(wasLevel+2)+' 关', wasLevel+1===1 ? '魔鬼来了 😈' : '继续！');
    } else {
      winGame();
    }
  }, 360);
}

// ───────────────────────── banners / overlay ─────────────────────────
let banner = null;
function flashBanner(big, small){ banner = {big, small, t:90}; }

const overlay = document.getElementById('overlay');
function showOverlay(html){ overlay.innerHTML = html; overlay.classList.remove('hidden'); }
function hideOverlay(){ overlay.classList.add('hidden'); }

function winGame(){
  running = false;
  touchUI.style.display='none';
  const t = (totalTime/1000).toFixed(1);
  showOverlay(`
    <h1>通关！</h1>
    <div class="taunt">原来你是真的厉害 👑</div>
    <div class="sub">总用时 <b style="color:#ffd27a">${t}s</b>　·　死亡 <b style="color:#ff8aa0">${deaths}</b> 次<br>
      ${deaths===0 ? '零死亡通关，这是大神吧？！' : deaths<6 ? '相当顶级的手速！' : '坚持就是胜利 💪'}</div>
    <button id="startBtn">再 来 一 次</button>
    <div class="hint">把你的成绩发到评论区，看看谁是真大神</div>
  `);
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame(){
  deaths = 0; totalTime = 0; transitioning=false;
  document.getElementById('deathNum').textContent = 0;
  hideOverlay();
  if(isTouch) touchUI.style.display='block';
  loadLevel(0);
  running = true;
  flashBanner('第 1 关', '热身一下');
}

// ───────────────────────── render ─────────────────────────
function vx(x){ return offX + x*scale; }
function vy(y){ return offY + y*scale; }
function vs(n){ return n*scale; }

function drawRoundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function render(){
  ctx.clearRect(0,0,W,H);
  // background
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#10183f'); g.addColorStop(1,'#06060f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // letterbox bars are just background; draw stars in field
  let sx=0, sy=0;
  if(screenShake>0){ sx=(Math.random()-0.5)*screenShake; sy=(Math.random()-0.5)*screenShake; screenShake*=0.85; if(screenShake<0.4)screenShake=0; }
  ctx.save();
  ctx.translate(sx, sy);

  // stars
  for(const st of bgStars){
    st.tw += 0.03;
    const a = 0.3 + 0.4*Math.sin(st.tw);
    ctx.globalAlpha = a;
    ctx.fillStyle = '#bcd0ff';
    ctx.beginPath(); ctx.arc(vx(st.x), vy(st.y), st.r*scale, 0, 7); ctx.fill();
  }
  ctx.globalAlpha=1;

  if(!running && overlay.classList.contains('hidden')===false){
    // overlay covers; still draw a calm field behind
  }

  const L = LEVELS[level] || LEVELS[0];

  // platforms
  for(const p of L.platforms){
    const x=vx(p.x), y=vy(p.y), w=vs(p.w), h=vs(p.h);
    ctx.fillStyle = '#2e3a73';
    drawRoundRect(x,y,w,h,Math.min(6*scale,h/2)); ctx.fill();
    ctx.fillStyle = '#5b6bb5';
    ctx.fillRect(x, y, w, Math.max(2,3*scale));
  }

  // moving platforms
  for(const m of movers){
    const x=vx(m.x), y=vy(m.y), w=vs(m.w), h=vs(m.h);
    ctx.fillStyle='#7a5bd8'; drawRoundRect(x,y,w,h,4*scale); ctx.fill();
    ctx.fillStyle='#b79cff'; ctx.fillRect(x,y,w,Math.max(2,2.5*scale));
  }

  // fallers
  for(const f of fallers){
    if(f.dead) continue;
    const x=vx(f.x), y=vy(f.fy), w=vs(f.w), h=vs(f.h);
    ctx.fillStyle = f.falling ? '#ff8a5b' : '#c0843a';
    drawRoundRect(x,y,w,h,3*scale); ctx.fill();
    ctx.strokeStyle='#ffd0a0'; ctx.lineWidth=Math.max(1,1.5*scale); ctx.stroke();
  }

  // spikes
  ctx.fillStyle = '#ff5d73';
  for(const s of L.spikes){
    const base = vy(s.y), top = vy(s.y-12);
    const n = Math.max(1, Math.round(s.w/14));
    const sw = vs(s.w)/n;
    for(let i=0;i<n;i++){
      const x0 = vx(s.x)+i*sw;
      ctx.beginPath();
      ctx.moveTo(x0, base); ctx.lineTo(x0+sw/2, top); ctx.lineTo(x0+sw, base); ctx.closePath();
      ctx.fill();
    }
  }

  // saws
  for(const s of saws){
    const cx=vx(s.x), cy=vy(s.y), r=vs(s.r);
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(s.spin||0);
    ctx.fillStyle='#c9d2ea';
    const teeth=8;
    ctx.beginPath();
    for(let i=0;i<teeth*2;i++){
      const rr = i%2? r : r*0.7;
      const a = i/(teeth*2)*Math.PI*2;
      const px=Math.cos(a)*rr, py=Math.sin(a)*rr;
      i? ctx.lineTo(px,py):ctx.moveTo(px,py);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#6b7290'; ctx.beginPath(); ctx.arc(0,0,r*0.32,0,7); ctx.fill();
    ctx.restore();
  }

  // goal flag
  const gx=vx(L.goal.x), gy=vy(L.goal.y), gw=vs(L.goal.w), gh=vs(L.goal.h);
  goalAnim += 0.08;
  ctx.fillStyle='#cdd6f5'; ctx.fillRect(gx, gy-gh, Math.max(2,3*scale), gh);
  const fw = vs(26), fwave = Math.sin(goalAnim)*vs(3);
  ctx.fillStyle='#67e8f9';
  ctx.beginPath();
  ctx.moveTo(gx+3*scale, gy-gh);
  ctx.lineTo(gx+3*scale+fw, gy-gh+vs(8)+fwave);
  ctx.lineTo(gx+3*scale, gy-gh+vs(16));
  ctx.closePath(); ctx.fill();
  // glow ring at base
  ctx.globalAlpha=0.4+0.2*Math.sin(goalAnim*2);
  ctx.strokeStyle='#67e8f9'; ctx.lineWidth=2*scale;
  ctx.beginPath(); ctx.ellipse(gx+3*scale, gy, vs(16), vs(6), 0,0,7); ctx.stroke();
  ctx.globalAlpha=1;

  // particles
  for(const p of particles){
    ctx.globalAlpha = Math.max(0, p.life/p.max);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(vx(p.x), vy(p.y), p.r*scale, 0, 7); ctx.fill();
  }
  ctx.globalAlpha=1;

  // player
  if(player.alive){
    const sq = player.squash;
    const pw = player.w * (2-sq), ph = player.h * sq;
    const px = vx(player.x - (pw-player.w)/2);
    const py = vy(player.y + (player.h-ph));
    const w = vs(pw), h = vs(ph);
    // body gradient
    const bg = ctx.createLinearGradient(px,py,px,py+h);
    bg.addColorStop(0,'#ffd27a'); bg.addColorStop(1,'#ff8aa0');
    ctx.fillStyle = bg;
    drawRoundRect(px,py,w,h, Math.min(8*scale, w/2)); ctx.fill();
    // eyes
    ctx.fillStyle='#241036';
    const eyeY = py + h*0.34, eyeR=Math.max(1.6, 2.4*scale);
    const ex = player.facing>0 ? 0.62 : 0.38;
    ctx.beginPath(); ctx.arc(px+w*ex, eyeY, eyeR,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(px+w*(ex+ (player.facing>0?-0.22:0.22)), eyeY, eyeR,0,7); ctx.fill();
  }

  // respawn flash
  if(respawnFlash>0){ ctx.fillStyle='rgba(255,120,140,'+(respawnFlash/12*0.4)+')'; ctx.fillRect(0,0,W,H); respawnFlash--; }

  ctx.restore();

  // banner (screen space, no shake)
  if(banner){
    const a = banner.t>70 ? (90-banner.t)/20 : banner.t<20 ? banner.t/20 : 1;
    ctx.globalAlpha = Math.max(0,Math.min(1,a));
    ctx.textAlign='center';
    ctx.fillStyle='#fff';
    ctx.font='900 '+Math.round(46*scale)+'px "Microsoft YaHei",sans-serif';
    ctx.shadowColor='#9d6bff'; ctx.shadowBlur=20*scale;
    ctx.fillText(banner.big, W/2, H*0.4);
    ctx.shadowBlur=0;
    ctx.font='700 '+Math.round(18*scale)+'px "Microsoft YaHei",sans-serif';
    ctx.fillStyle='#ffd27a';
    ctx.fillText(banner.small, W/2, H*0.4 + 38*scale);
    ctx.globalAlpha=1; ctx.textAlign='left';
  }
}

// ───────────────────────── loop ─────────────────────────
let last = performance.now();
function loop(now){
  const dt = Math.min(50, now-last); last=now; frame++;

  if(running && player.alive && !transitioning){
    updateMovers();
    physics();
    levelTime += dt; totalTime += dt;
    document.getElementById('timer').textContent = (totalTime/1000).toFixed(1)+'s';
  } else if(running){
    updateMovers();   // keep world alive during death/transition
  }

  // particles update always
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life--; }
  particles = particles.filter(p=>p.life>0);
  if(banner){ banner.t--; if(banner.t<=0) banner=null; }

  computeView();
  render();
  requestAnimationFrame(loop);
}

// ───────────────────────── boot ─────────────────────────
resize();
document.getElementById('startBtn').addEventListener('click', startGame);
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
